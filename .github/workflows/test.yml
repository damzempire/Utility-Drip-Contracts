name: Utility Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
          components: rustfmt, clippy
          
      - name: Install Stellar CLI
        run: |
          wget https://github.com/stellar/stellar-cli/releases/download/v25.1.0/stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz
          sudo mv stellar-cli-25.1.0-x86_64-unknown-linux-gnu/stellar /usr/local/bin/
          
      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            
      - name: Check formatting
        run: cargo fmt --all -- --check
        
      - name: Run Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
        
      - name: Build Contract
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install dependencies for optimization
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Optimize Wasm
        run: |
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/price_oracle.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/utility_contracts.wasm
        
      - name: Run Unit Tests
        run: cargo test
        
      - name: Run Fuzz Tests (if available)
        run: |
          if [ -d "contracts/utility_contracts/fuzz" ]; then
            cd contracts/utility_contracts
            cargo install cargo-fuzz || true
            echo "Fuzz testing infrastructure available"
          else
            echo "No fuzz tests found, skipping fuzz test run"
          fi
          
      - name: Test Coverage Report
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests: cargo test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Clippy linting: cargo clippy" >> $GITHUB_STEP_SUMMARY  
          echo "- ✅ Code formatting: cargo fmt --check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ WASM build: cargo build --target wasm32-unknown-unknown" >> $GITHUB_STEP_SUMMARY
          if [ -d "contracts/utility_contracts/fuzz" ]; then
            echo "- ✅ Fuzz tests: Available and configured" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- ✅ Wasm Optimization: stellar contract optimize" >> $GITHUB_STEP_SUMMARY
